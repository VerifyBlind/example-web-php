Listen 5202

<VirtualHost *:5202>
    DocumentRoot /var/www/html
    ServerName localhost

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # Once index.html (statik widget), sonra index.php (legacy)
        DirectoryIndex index.html index.php
    </Directory>

    # Defense-in-depth: never serve dotfiles (.env, .git, .htaccess, ...) even if one
    # ends up inside the docroot. The .env is loaded from OUTSIDE the docroot anyway.
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
