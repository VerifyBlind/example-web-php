<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VerifyBlind Test Platformu</title>
    <link rel="icon" href="https://cdn.verifyblind.com/images/favicon.ico" type="image/x-icon">
    <script>
      window.__VB_CDN = 'https://cdn.verifyblind.com';
      window.__VB_API = 'https://api.verifyblind.com';
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; flex-direction: column; min-height: 100vh; background: linear-gradient(135deg, #0f172a, #1e1b4b); color: #f8fafc; }
    .main-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; color: white; padding: 2rem; }
    .container { width: 100%; max-width: 480px; background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
    .header { text-align: center; margin-bottom: 2rem; }
    .logo-box {
        display: flex; align-items: center; justify-content: center;
        margin: 0 auto 20px;
    }
    h1 { font-size: 24px; font-weight: 800; color: white; }
    .subtitle { color: #94a3b8; font-size: 15px; margin-top: 8px; }
    .card-custom { background: white; border-radius: 24px; padding: 32px; color: #1e293b; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); }
    .title-sm { font-size: 12px; font-weight: 700; color: #64748b; letter-spacing: 1px; margin-bottom: 20px; }
    .option-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
    .label-text { font-size: 15px; font-weight: 500; color: #1e293b; }
    .btn-main {
        display: flex; align-items: center; justify-content: center; gap: 10px;
        width: 100%; margin-top: 20px; background: #6366f1; color: white;
        border: none; border-radius: 14px; padding: 16px; font-weight: 700;
        cursor: pointer; font-size: 15px; text-decoration: none;
    }
    .btn-main:hover { background: #4f46e5; }
    .btn-cancel {
        margin-top: 32px; background: transparent; border: 1px solid #cbd5e1;
        border-radius: 10px; padding: 10px 20px; color: #64748b;
        font-size: 14px; cursor: pointer;
    }
    .data-results { background: #f9fafb; padding: 16px; border-radius: 12px; border: 1px solid #e5e7eb; margin-top: 16px; }
    .animate-in { animation: slideUp 0.4s ease-out; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    footer { text-align: center; padding: 16px; font-size: 12px; color: #888; border-top: 1px solid rgba(255,255,255,0.08); }
    footer a { color: #888; text-decoration: underline; }
    footer a:first-child { margin-right: 16px; }
    </style>
</head>
<body>
<div class="main-wrapper">
    <div class="container">
        <div class="header">
            <div class="logo-box">
                <img id="vb-logo" src="" alt="VerifyBlind" width="80" height="80" style="object-fit:contain;">
            </div>
            <h1>VerifyBlind Test Platformu</h1>
            <p class="subtitle">Modern Kimlik Doğrulama Deneyimi</p>
        </div>

        <div id="options-card" class="card-custom auth-form animate-in">
            <h2 class="title-sm">İSTENEN VERİLER</h2>
            <div class="options-list">
                <label class="option-item">
                    <input type="checkbox" id="opt-userid" checked />
                    <span class="label-text">Kullanıcı Kimliği (Maskeli)</span>
                </label>
                <label class="option-item">
                    <input type="checkbox" id="opt-age" checked />
                    <span class="label-text">Yaş Doğrulaması (18+)</span>
                </label>
            </div>
            <button id="btn-start" class="btn-main" onclick="handleStart()">
                Doğrulamayı Başlat &#10132;
            </button>
        </div>

        <div id="widget-card" class="card-custom animate-in" style="display:none;">
            <div id="verifyblind-widget"></div>
            <button class="btn-cancel" onclick="handleReset()" style="margin-top:16px;width:100%;">İptal Et</button>
        </div>

        <div id="result-card" class="card-custom result-view animate-in" style="display:none;">
            <div style="text-align:center;">
                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24"
                     fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     style="display:block;margin:0 auto 16px;">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                    <polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
                <h2 style="font-size:1.5rem;font-weight:700;color:#1f2937;">Doğrulama Başarılı</h2>
            </div>
            <div class="data-results">
                <h3 style="font-size:0.75rem;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:12px;">
                    Güvenli Veri Çıktısı
                </h3>
                <pre id="result-pre" style="font-size:0.875rem;font-family:monospace;color:#374151;white-space:pre-wrap;"></pre>
            </div>
            <button class="btn-main" onclick="handleReset()" style="margin-top:24px;">Yeniden Test Et</button>
        </div>
    </div>
</div>
<footer>
    <a href="https://verifyblind.com/cerez-politikasi">Çerez Politikası</a>
    <a href="https://verifyblind.com/aydinlatma-metni">Aydınlatma Metni</a>
</footer>

<script>
  document.getElementById('vb-logo').src = window.__VB_CDN + '/images/logo.png';
  (function() {
    var s = document.createElement('script');
    s.src = window.__VB_CDN + '/sdk/v1/verifyblind.js';
    document.head.appendChild(s);
  })();
</script>
<script>
function getGenerateUrl() {
    var path = window.location.pathname;
    if (path.indexOf('/php') === 0) return '/php/api/generate.php';
    if (path.indexOf('/net') === 0) return '/net/api/generate';
    return '/api/generate';
}

function getVerifyUrl() {
    var path = window.location.pathname;
    if (path.indexOf('/php') === 0) return '/php/api/verify.php';
    if (path.indexOf('/net') === 0) return '/net/api/verify';
    return '/api/verify';
}

function getValidations() {
    var v = {};
    if (document.getElementById('opt-userid').checked) v.user_id = true;
    if (document.getElementById('opt-age').checked) v.age = '18+';
    return v;
}

function handleStart() {
    if (typeof window.VerifyBlind === 'undefined') {
        var btn = document.getElementById('btn-start');
        if (btn) { btn.disabled = true; btn.textContent = 'SDK yükleniyor...'; }
        var t = 0;
        var wait = setInterval(function() {
            t += 200;
            if (typeof window.VerifyBlind !== 'undefined') {
                clearInterval(wait);
                if (btn) { btn.disabled = false; btn.innerHTML = 'Doğrulamayı Başlat &#10132;'; }
                handleStart();
            } else if (t > 5000) {
                clearInterval(wait);
                alert('VerifyBlind SDK yüklenemedi. Sayfayı yenileyin.');
                if (btn) { btn.disabled = false; btn.innerHTML = 'Doğrulamayı Başlat &#10132;'; }
            }
        }, 200);
        return;
    }
    document.getElementById('options-card').style.display = 'none';
    document.getElementById('widget-card').style.display = 'block';

    window.VerifyBlind.init({
        containerId: 'verifyblind-widget',
        generateUrl: getGenerateUrl(),
        apiUrl: window.__VB_API || undefined,
        captcha: false,
        payload: { validations: getValidations() },
        onSuccess: function (data) {
            if (!data.token) { showResult(data); return; }
            fetch(getVerifyUrl(), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: data.token })
            })
            .then(function(r) { return r.json(); })
            .then(function(res) {
                if (res.success) { showResult(data); }
                else { alert('Enclave imza doğrulaması başarısız: ' + (res.error || 'Bilinmeyen hata')); handleReset(); }
            })
            .catch(function() { alert('Sunucu bağlantısı koptu, imza doğrulanamadı.'); handleReset(); });
        },
        onError: function (err) {
            alert('Hata: ' + (err.message || err));
            handleReset();
        },
        onCancelled: function () { handleReset(); }
    });
}

function showResult(data) {
    document.getElementById('widget-card').style.display = 'none';
    var lines = [];
    function maskId(id) { return (!id || id.length <= 8) ? id : id.substring(0, 4) + '...' + id.substring(id.length - 4); }
    function fmtVal(v) { return v === true ? 'Evet' : v === false ? 'Hayır' : String(v); }
    if (data.user_id) lines.push('• User ID: ' + maskId(data.user_id));
    if (data.nsbd_id) lines.push('• NSBD ID: ' + maskId(data.nsbd_id));
    if (data.doc_id) lines.push('• Doc ID: ' + maskId(data.doc_id));
    if (data.validations) Object.keys(data.validations).forEach(function (k) { lines.push('• ' + k + ': ' + fmtVal(data.validations[k])); });
    Object.keys(data).filter(function (k) { return ['user_id','nsbd_id','doc_id','nonce','validations','status','token'].indexOf(k) === -1; })
        .forEach(function (k) { lines.push('• ' + k + ': ' + fmtVal(data[k])); });
    if (lines.length === 0) lines.push(JSON.stringify(data, null, 2));
    document.getElementById('result-pre').textContent = lines.join('\n');
    document.getElementById('result-card').style.display = 'block';
}

function handleReset() {
    if (window.VerifyBlind && typeof window.VerifyBlind.destroy === 'function') {
        try { window.VerifyBlind.destroy(); } catch (e) {}
    }
    document.getElementById('widget-card').style.display = 'none';
    document.getElementById('verifyblind-widget').innerHTML = '';
    document.getElementById('result-card').style.display = 'none';
    document.getElementById('options-card').style.display = 'block';
}

window.handleReset = handleReset;
window.handleStart = handleStart;
</script>
</body>
</html>
